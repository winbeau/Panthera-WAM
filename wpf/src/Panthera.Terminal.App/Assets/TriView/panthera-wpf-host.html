<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panthera WPF TriView</title>
  <style>
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:transparent; }
    iframe { display:block; width:100%; height:100%; border:0; background:transparent; }
  </style>
</head>
<body>
  <iframe id="triview" src="docs/mockups/panthera-six-axis-three-view.html?camera=fixed-base&amp;style=material" title="Panthera-HT 精确 CAD 三视图"></iframe>
  <script>
    (() => {
      'use strict';
      const frame = document.getElementById('triview');
      let api = null;
      let configured = false;
      let pendingState = { positions:[0,0,0,0,0,0], gripper:1, source:'WPF' };
      let pendingTheme = 'light';

      const childCss = `
        html,body { width:100%!important; height:100%!important; min-height:0!important; margin:0!important; overflow:hidden!important; background:transparent!important; }
        body { padding:0!important; }
        .app { width:100%!important; height:100vh!important; min-height:0!important; margin:0!important; border:0!important; border-radius:0!important; box-shadow:none!important; background:transparent!important; }
        .topbar,.controls,.statusline { display:none!important; }
        .stage-shell { height:100vh!important; min-height:0!important; padding:0!important; }
        .stage { height:100vh!important; min-height:0!important; padding:6px!important; gap:6px!important; grid-template-columns:minmax(0,1.22fr) minmax(0,1.22fr) minmax(215px,.72fr)!important; grid-template-rows:auto minmax(0,1fr)!important; grid-template-areas:'side front top' 'side front facts'!important; }
        .side { grid-area:side!important; }
        .front { grid-area:front!important; }
        .top { grid-area:top!important; width:100%!important; aspect-ratio:4/3!important; align-self:start!important; }
        .facts { grid-area:facts!important; padding:9px!important; overflow:auto!important; }
        .facts-title { display:flex; align-items:center; gap:7px; }
        .facts-title h2 { margin:0; font-size:13px!important; }
        .gripper-chip { margin-left:auto; padding:3px 6px; border-radius:999px; color:var(--good); background:color-mix(in srgb,var(--good) 13%,transparent); font:650 9.5px var(--mono); white-space:nowrap; }
        .gripper-chip[data-state='closed'] { color:var(--danger); background:color-mix(in srgb,var(--danger) 12%,transparent); }
        .gripper-chip[data-state='partial'] { color:var(--warn); background:color-mix(in srgb,var(--warn) 13%,transparent); }
        .facts .meta { font-size:10px!important; line-height:1.35!important; }
        .tcp-grid { margin-top:7px!important; gap:5px!important; }
        .tcp-cell { padding:6px!important; }
        .tcp-cell span { font-size:9px!important; }
        .tcp-cell b { font-size:11.5px!important; }
        .live-meta { margin-top:7px!important; gap:7px!important; font-size:9px!important; }
        .kinematic-chain { margin-top:7px!important; gap:3px!important; }
        .kinematic-chain li { font-size:9.5px!important; }
        .kinematic-chain li.gripper-state .axis i { background:var(--good)!important; }
        .kinematic-chain li.gripper-state code:last-child { min-width:70px; text-align:right; }
        .facts .api { display:none!important; }
        .view-head { top:8px!important; left:10px!important; }
        .view-head b { font-size:12px!important; letter-spacing:.35px!important; }
        .view-head span { font-size:10px!important; }
        .view .corner-note,.view .scale-note { font-size:9.5px!important; }
        @media (max-width:980px) {
          .stage { grid-template-columns:minmax(0,1fr) minmax(0,1fr)!important; grid-template-rows:minmax(0,1.18fr) minmax(210px,.82fr)!important; grid-template-areas:'side front' 'top facts'!important; }
          .top { height:100%!important; aspect-ratio:auto!important; align-self:stretch!important; }
          .facts { overflow:hidden!important; }
        }
      `;

      function post(message) {
        window.chrome?.webview?.postMessage(message);
      }

      function gripperText(opening) {
        const percent = Math.max(0, Math.min(100, Math.round(Number(opening || 0) * 100)));
        const state = percent <= 8 ? 'closed' : percent >= 92 ? 'open' : 'partial';
        const label = state === 'closed' ? 'CLOSED' : state === 'open' ? 'OPEN' : 'PARTIAL';
        return { percent, state, text:`${label} · ${percent}%` };
      }

      function updateGripper(opening) {
        const doc = frame.contentDocument;
        if (!doc) return;
        const value = gripperText(opening);
        const chip = doc.getElementById('wpf-gripper-state');
        if (chip) { chip.textContent = value.text; chip.dataset.state = value.state; }
        const chain = doc.getElementById('wpf-gripper-chain');
        if (chain) chain.textContent = value.text;
        const bar = doc.getElementById('wpf-gripper-axis');
        if (bar) bar.style.width = `${value.percent}%`;
      }

      function applyTheme(theme) {
        pendingTheme = theme || 'light';
        const doc = frame.contentDocument;
        if (!doc) return;
        const wantsDark = pendingTheme === 'dark' || pendingTheme === 'highcontrast';
        const isDark = doc.documentElement.dataset.theme === 'dark';
        if (wantsDark !== isDark) doc.getElementById('theme-btn')?.click();
      }

      function applyState(state) {
        pendingState = state || pendingState;
        if (!api) return false;
        api.setState(pendingState);
        updateGripper(pendingState.gripper);
        return true;
      }

      function configure() {
        if (configured || !frame.contentDocument || !frame.contentWindow?.PantheraThreeView) return false;
        configured = true;
        api = frame.contentWindow.PantheraThreeView;
        const doc = frame.contentDocument;
        const style = doc.createElement('style');
        style.textContent = childCss;
        doc.head.appendChild(style);

        const facts = doc.querySelector('.facts');
        const title = facts?.querySelector('h2');
        if (facts && title) {
          const titleRow = doc.createElement('div');
          titleRow.className = 'facts-title';
          title.textContent = '六轴 + 夹爪实时状态';
          title.parentNode.insertBefore(titleRow, title);
          titleRow.appendChild(title);
          const chip = doc.createElement('span');
          chip.id = 'wpf-gripper-state';
          chip.className = 'gripper-chip';
          chip.dataset.state = 'open';
          chip.textContent = 'OPEN · 100%';
          titleRow.appendChild(chip);
        }
        const list = doc.getElementById('chain-list');
        if (list && !doc.getElementById('wpf-gripper-chain')) {
          const row = doc.createElement('li');
          row.className = 'gripper-state';
          row.innerHTML = '<code>GRIP</code><div class="axis"><i id="wpf-gripper-axis" style="width:100%"></i></div><code id="wpf-gripper-chain">OPEN · 100%</code>';
          list.appendChild(row);
        }
        api.setCameraMode('fixed-base');
        api.setStyle('material');
        applyTheme(pendingTheme);
        applyState(pendingState);
        api.render();
        post({ type:'bridge-ready' });

        const modelTimer = setInterval(() => {
          const model = api?.getState?.().model;
          if (model === 'exact' || model === 'lightweight') {
            clearInterval(modelTimer);
            post({ type:'model-ready', model });
          }
        }, 150);
        return true;
      }

      frame.addEventListener('load', () => {
        const timer = setInterval(() => {
          if (configure()) clearInterval(timer);
        }, 50);
      });

      window.PantheraWpfBridge = {
        setState: applyState,
        setStyle: style => api?.setStyle(style),
        setCameraMode: mode => api?.setCameraMode(mode),
        setTheme: applyTheme,
        getState: () => api?.getState?.() || null,
      };
    })();
  </script>
</body>
</html>
