<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panthera WPF TriView</title>
  <style>
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:transparent; }
    iframe { display:block; width:100%; height:100%; border:0; background:transparent; }
  </style>
</head>
<body>
  <iframe id="triview" src="docs/mockups/panthera-six-axis-three-view.html?camera=fixed-base&amp;style=material" title="Panthera-HT 精确 CAD 三视图"></iframe>
  <script>
    (() => {
      'use strict';
      const frame = document.getElementById('triview');
      let api = null;
      let configured = false;
      let pendingState = { positions:[0,0,0,0,0,0], gripper:1, source:'WPF' };
      let pendingTheme = 'light';

      const childCss = `
        html,body { width:100%!important; height:100%!important; min-height:0!important; margin:0!important; overflow:hidden!important; background:transparent!important; }
        body { padding:0!important; }
        .app { width:100%!important; height:100vh!important; min-height:0!important; margin:0!important; border:0!important; border-radius:0!important; box-shadow:none!important; background:transparent!important; }
        .topbar,.controls,.statusline { display:none!important; }
        .stage-shell { height:100vh!important; min-height:0!important; padding:0!important; }
        .stage { height:100vh!important; min-height:0!important; padding:6px!important; gap:6px!important; grid-template-columns:repeat(3,minmax(0,1fr))!important; grid-template-rows:minmax(0,1fr)!important; grid-template-areas:'side front top'!important; }
        .side { grid-area:side!important; height:100%!important; aspect-ratio:auto!important; align-self:stretch!important; }
        .front { grid-area:front!important; height:100%!important; aspect-ratio:auto!important; align-self:stretch!important; }
        .top { grid-area:top!important; width:100%!important; height:100%!important; aspect-ratio:auto!important; align-self:stretch!important; }
        .facts { display:none!important; }
        .wpf-state-cache { display:none!important; }
        .camera-panel { width:100%; height:100%; min-height:0; display:grid; grid-template-rows:38px minmax(0,1fr) 28px; background:#0b1014; }
        .camera-head { display:flex; align-items:center; gap:8px; padding:0 10px; color:#f4f7f8; background:#182126; border-bottom:1px solid rgba(255,255,255,.10); }
        .camera-head strong { font-size:13px; font-weight:650; }
        .camera-head span { margin-left:auto; color:#92d5f2; font:650 10px var(--mono); }
        .camera-frame { position:relative; min-height:0; overflow:hidden; background:linear-gradient(145deg,#10181d,#080d10); }
        .camera-frame img { width:100%; height:100%; display:block; object-fit:cover; opacity:0; transition:opacity .16s ease; }
        .camera-frame.has-frame img { opacity:1; }
        .camera-empty { position:absolute; inset:0; display:grid; place-items:center; color:#8d9aa2; font:11px var(--mono); letter-spacing:.25px; }
        .camera-frame.has-frame .camera-empty { display:none; }
        .camera-meta { display:flex; align-items:center; gap:8px; padding:0 10px; color:#9eabb2; background:#11191d; border-top:1px solid rgba(255,255,255,.08); font:10px var(--mono); }
        .camera-meta b { color:#eef4f6; font-weight:600; }
        .view-head { top:8px!important; left:10px!important; }
        .view-head strong { font-size:13px!important; letter-spacing:.35px!important; }
        .view-head span { font-size:11px!important; }
        .viewport .view-note,.viewport .scale { font-size:10.5px!important; }
      `;

      function post(message) {
        window.chrome?.webview?.postMessage(message);
      }

      function gripperText(opening) {
        const percent = Math.max(0, Math.min(100, Math.round(Number(opening || 0) * 100)));
        const state = percent <= 8 ? 'closed' : percent >= 92 ? 'open' : 'partial';
        const label = state === 'closed' ? 'CLOSED' : state === 'open' ? 'OPEN' : 'PARTIAL';
        return { percent, state, text:`${percent}%` };
      }

      function updateGripper(opening) {
        const doc = frame.contentDocument;
        if (!doc) return;
        const value = gripperText(opening);
        const chip = doc.getElementById('wpf-gripper-state');
        if (chip) { chip.textContent = value.text; chip.dataset.state = value.state; }
        const chain = doc.getElementById('wpf-gripper-chain');
        if (chain) chain.textContent = value.text;
        const bar = doc.getElementById('wpf-gripper-axis');
        if (bar) bar.style.width = `${value.percent}%`;
      }

      function applyTheme(theme) {
        pendingTheme = theme || 'light';
        const doc = frame.contentDocument;
        if (!doc) return;
        const wantsDark = pendingTheme === 'dark' || pendingTheme === 'highcontrast';
        const isDark = doc.documentElement.dataset.theme === 'dark';
        if (wantsDark !== isDark) doc.getElementById('theme-btn')?.click();
      }

      function applyState(state) {
        pendingState = state || pendingState;
        if (!api) return false;
        api.setState(pendingState);
        updateGripper(pendingState.gripper);
        return true;
      }

      function applyCameraFrame(dataUrl) {
        const doc = frame.contentDocument;
        const image = doc?.getElementById('wpf-overhead-rgb');
        const viewport = image?.closest('.camera-frame');
        const state = doc?.getElementById('wpf-overhead-state');
        if (!image || !viewport || !dataUrl) return false;
        image.onload = () => {
          viewport.classList.add('has-frame');
          if (state) state.textContent = 'LIVE RGB8';
        };
        image.src = dataUrl;
        return true;
      }

      function applyWpfCameraFraming() {
        try {
          frame.contentWindow.eval(`
            fixedFrames.side.worldHeight = .70;
            fixedFrames.front.worldHeight = .68;
          `);
        } catch {
          // The embedded viewer keeps these values private; retain its defaults if they change upstream.
        }
      }

      function configure() {
        if (configured || !frame.contentDocument || !frame.contentWindow?.PantheraThreeView) return false;
        configured = true;
        api = frame.contentWindow.PantheraThreeView;
        applyWpfCameraFraming();
        const doc = frame.contentDocument;
        const style = doc.createElement('style');
        style.textContent = childCss;
        doc.head.appendChild(style);

        const facts = doc.querySelector('.facts');
        if (facts && !doc.getElementById('wpf-overhead-rgb')) {
          const cache = doc.createElement('div');
          cache.className = 'wpf-state-cache';
          while (facts.firstChild) cache.appendChild(facts.firstChild);
          facts.appendChild(cache);
          const panel = doc.createElement('section');
          panel.className = 'camera-panel';
          panel.innerHTML = `<div class="camera-head"><strong>俯视摄像头</strong><span id="wpf-overhead-state">WAITING</span></div>
            <div class="camera-frame"><img id="wpf-overhead-rgb" alt="C920e 俯视实时画面"><div class="camera-empty">C920e · 等待俯视画面</div></div>
            <div class="camera-meta"><b>C920e</b><span>OVERHEAD</span><span>WPF camera stream</span></div>`;
          facts.appendChild(panel);
        }
        const list = doc.getElementById('chain-list');
        if (list && !doc.getElementById('wpf-gripper-chain')) {
          const row = doc.createElement('li');
          row.className = 'gripper-state';
          row.innerHTML = '<code>GRIP</code><div class="axis"><i id="wpf-gripper-axis" style="width:100%"></i></div><code id="wpf-gripper-chain">OPEN · 100%</code>';
          list.appendChild(row);
        }
        api.setCameraMode('fixed-base');
        api.setStyle('material');
        applyTheme(pendingTheme);
        applyState(pendingState);
        api.render();
        post({ type:'bridge-ready' });

        const modelTimer = setInterval(() => {
          const model = api?.getState?.().model;
          if (model === 'exact' || model === 'lightweight') {
            clearInterval(modelTimer);
            post({ type:'model-ready', model });
          }
        }, 150);
        return true;
      }

      frame.addEventListener('load', () => {
        const timer = setInterval(() => {
          if (configure()) clearInterval(timer);
        }, 50);
      });

      window.PantheraWpfBridge = {
        setState: applyState,
        setStyle: style => api?.setStyle(style),
        setCameraMode: mode => api?.setCameraMode(mode),
        setTheme: applyTheme,
        setCameraFrame: applyCameraFrame,
        getState: () => api?.getState?.() || null,
      };
    })();
  </script>
</body>
</html>
