<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Panthera Terminal application icon</title>
  <desc id="desc">A six-tooth blue drive ring, three-axis robot joint, and robotic gripper on a navy rounded square.</desc>
  <defs>
    <linearGradient id="tile" x1="72" y1="52" x2="448" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102B43"/>
      <stop offset="1" stop-color="#07131F"/>
    </linearGradient>
    <linearGradient id="accent" x1="82" y1="104" x2="374" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37A5FF"/>
      <stop offset="0.55" stop-color="#0A7BEA"/>
      <stop offset="1" stop-color="#0067C0"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#tile)"/>
  <path d="M72 118C118 65 184 40 260 44" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="12" stroke-linecap="round"/>

  <!-- Six teeth represent the six controlled arm axes. -->
  <g fill="url(#accent)">
    <rect x="190" y="92" width="56" height="84" rx="14"/>
    <rect x="190" y="92" width="56" height="84" rx="14" transform="rotate(60 218 288)"/>
    <rect x="190" y="92" width="56" height="84" rx="14" transform="rotate(120 218 288)"/>
    <rect x="190" y="92" width="56" height="84" rx="14" transform="rotate(180 218 288)"/>
    <rect x="190" y="92" width="56" height="84" rx="14" transform="rotate(240 218 288)"/>
    <rect x="190" y="92" width="56" height="84" rx="14" transform="rotate(300 218 288)"/>
    <circle cx="218" cy="288" r="118" fill="none" stroke="url(#accent)" stroke-width="48"/>
  </g>

  <!-- Three spokes echo a robot joint and the World / Action / Model triad. -->
  <g fill="none" stroke-linecap="round" stroke-width="28">
    <path d="M218 288V216" stroke="#F4FAFF"/>
    <path d="M218 288L151 337" stroke="#9BD3FF"/>
    <path d="M218 288L294 344" stroke="#F4FAFF"/>
  </g>
  <circle cx="218" cy="288" r="33" fill="#0A1C2B" stroke="#38A7FF" stroke-width="17"/>
  <circle cx="218" cy="288" r="11" fill="#F4FAFF"/>

  <!-- Simplified end effector: two rails terminating in an open gripper. -->
  <g fill="#EAF6FF" stroke="#EAF6FF" stroke-linejoin="round">
    <path d="M284 219L345 158" fill="none" stroke-width="23" stroke-linecap="square"/>
    <path d="M309 244L370 183" fill="none" stroke-width="23" stroke-linecap="square"/>
    <path d="M341 145L331 124L340 86L390 57L421 73L382 101L377 125L397 146L424 146L453 116L463 144L433 180L391 180Z" stroke="none"/>
  </g>
  <path d="M288 220L304 236" stroke="#58B7FF" stroke-width="8" stroke-linecap="round"/>
</svg>
