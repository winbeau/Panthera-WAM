name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        run: python -m pip install uv
      - name: Run checks
        run: make check

  wpf:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "9.0.x"
      - name: Build, test, and publish WPF release
        shell: pwsh
        env:
          PANTHERA_UI_ARTIFACTS: ${{ runner.temp }}\ui-artifacts
        run: >-
          ./deploy/build-wpf.ps1
          -Mode Ci
          -PublishPath "${{ runner.temp }}\panthera-terminal-win-x64"
      - name: Upload WPF UI artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wpf-ui-artifacts
          path: ${{ runner.temp }}\ui-artifacts
          if-no-files-found: error
      - name: Upload self-contained WPF executable
        uses: actions/upload-artifact@v7
        with:
          name: panthera-terminal-win-x64
          path: ${{ runner.temp }}\panthera-terminal-win-x64
          if-no-files-found: error
