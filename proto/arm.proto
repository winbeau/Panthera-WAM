// Panthera-WAM armd 服务契约（单一契约源）
//
// 约定：
//  - 本文件是 armd / panthera-cli / WPF 三端唯一契约源。改动后必须同时重新生成
//    Python 与 C# stub，并在同一个 commit 里提交（CLAUDE.md 开发约定）。
//  - **控制权 lease 不在消息体里**：`AcquireControl` 返回的 token 由客户端放进
//    gRPC metadata `x-panthera-lease`，服务端拦截器统一校验（FINAL_PLAN §3.1）。
//    因此所有「写/动机械臂」类请求消息**不含** lease 字段。
//  - 标量凡是「未设」与「显式 0」语义不同的，一律用 proto3 `optional`（presence），
//    默认值见各字段注释与 FINAL_PLAN §7.1。
//
// 字段语义的事实来源：FINAL_PLAN 文末「SDK 源码核实结论」（逐行核对官方源码）。
// 与 SDK README 冲突时以该节为准。

syntax = "proto3";

package panthera.arm.v1;

option csharp_namespace = "Panthera.Arm.V1";

// ============================================================
// 通用
// ============================================================

message Empty {}

enum ExecState {
  EXEC_STATE_UNSPECIFIED = 0;
  EXEC_STATE_RUNNING = 1;
  EXEC_STATE_DONE = 2;
  EXEC_STATE_FAILED = 3;
  EXEC_STATE_CANCELLED = 4;
}

message ExecutionAccepted { string execution_id = 1; }
message StreamExecutionRequest { string execution_id = 1; }

message ExecutionStatus {
  string execution_id = 1;
  ExecState state = 2;
  double fraction = 3;              // [0,1]，自建执行循环逐点发布，单调递增
  RobotState robot_state = 4;       // 便于客户端同步观察
  string error_message = 5;         // state == FAILED 时填充
}

message CancelExecutionRequest { string execution_id = 1; }
message CancelExecutionResponse { bool cancelled = 1; }

// ============================================================
// 控制权 / 安全层
// ============================================================

message AcquireControlRequest {
  string client_id = 1;
  // 抢锁：成功后 armd 会强制取消前持有者在飞的 execution 并安全收尾（§3.3）
  bool force = 2;
}
message AcquireControlResponse {
  bool granted = 1;
  string holder_client_id = 2;      // 被拒时告知当前持有者，便于协调
  string lease_token = 3;           // 之后放进 metadata x-panthera-lease
}

message ControlStatus {
  bool held = 1;
  string holder_client_id = 2;
  bool estop_engaged = 3;
  bool watchdog_ok = 4;
  int64 last_heartbeat_age_ms = 5;
}

message HeartbeatRequest {}          // 身份由 metadata 承载
message HeartbeatResponse { bool ok = 1; int64 server_time_ms = 2; }

message EStopRequest { string reason = 1; }
message EStopResponse { bool engaged = 1; int64 timestamp_ms = 2; }

// ClearEStop 需持锁 + confirm=true（§3.3，G10）。confirm 由服务端判定，
// 不是客户端自觉。
message ClearEStopRequest { bool confirm = 1; }

message JointLimit {
  string name = 1;
  double pos_min = 2;
  double pos_max = 3;
  double vel_max = 4;
  double torque_max = 5;
}
message GripperLimit {
  double pos_min = 1;
  double pos_max = 2;
  double vel_max = 3;
  double torque_max = 4;
}
message SoftLimits {
  repeated JointLimit joint_limits = 1;
  GripperLimit gripper_limit = 2;
  // 电机层限位使能当前全为 false（核实结论 N3），故软限位预检是**唯一防线**。
  // 该字段如实反映硬件层是否也在保护，避免上层误以为有双保险。
  bool hardware_limits_enabled = 3;
}

// SetZero：**不产生运动**（核实结论 §V2，MODE_RESET_ZERO 0x01 只重定义零点）。
// 危险性来自「整体平移零参考导致所有软限位错位」，故仍强制 confirm + 持锁。
message SetZeroRequest {
  bool confirm = 1;
  // 空 = 全部电机（不持久化，掉电失效）；非空 = 指定电机（会 set_conf_write
  // 写入电机 flash，持久）。两者语义差异见 §V2。
  repeated int32 motor_ids = 2;
}
message SetZeroResponse {
  bool accepted = 1;
  bool persisted = 2;               // 是否已写入电机 flash
  string reject_reason = 3;
}

// ============================================================
// 状态查询
// ============================================================

// 字段与 C++ `motor_back_t` 严格对齐（核实结论 §V4）。
// 注意：初稿臆测的 `online` 字段在 SDK 中**不存在**，已删除；
// 在线与否改由 `valid`（position != 999.0 哨兵）+ `age_ms` 判定。
message MotorState {
  string name = 1;                  // Motor.get_motor_name()
  int32 motor_id = 2;               // motor_back_t.ID（注意 SDK 里是大写 ID）
  double position = 3;              // rad
  double velocity = 4;              // rad/s
  double torque = 5;                // N·m
  double motor_time = 6;            // motor_back_t.time，电机侧时间戳（秒）
  // motor_back_t.mode，取值为固件 MODE_* 常量：
  // 0x80 POSITION / 0x81 VELOCITY / 0x82 TORQUE / 0x90 POS_VEL_TQE /
  // 0x9E POS_VEL_KP_KD / 0xAD POS_VEL_ACC / 0xB0 POS_VEL_TQE_KP_KD_2
  // → 这是 §4「按当前控制模式选择停止动作」的判据来源。
  uint32 mode = 7;
  uint32 fault = 8;                 // motor_back_t.fault 故障码（WPF 关节级故障显示）
  // Motor.pos_limit_flag: 0 正常 / 1 超上限 / -1 超下限
  int32 pos_limit_flag = 9;
  // Motor.tor_limit_flag: 0 正常 / 1 超上限 / -1 超下限
  int32 tor_limit_flag = 10;
  // position == 999.0 是 SDK 的「未连接」哨兵；armd 据此置 false，
  // 绝不把 999.0 当真实位置推给客户端（核实结论 §V4）。
  bool valid = 11;
}

message JointState {
  repeated MotorState joints = 1;   // 6 个关节
  int64 timestamp_ms = 2;
}
message GripperState {
  MotorState state = 1;             // 第 7 个电机
  int64 timestamp_ms = 2;
}

message RobotState {
  JointState joint = 1;
  GripperState gripper = 2;
  // 缓存新鲜度（G14b）。SDK 自身以 0.1s 作为新鲜阈值，客户端可据此降级显示。
  int64 age_ms = 3;
  bool estop_engaged = 4;
}

message StreamStateRequest {
  optional double rate_hz = 1;      // 未设 → 10
  bool joints = 2;
  bool gripper = 3;
}

// check_position_reached 只比较关节，**不含夹爪**（核实结论；G12）。
message CheckReachedRequest {
  repeated double target_positions = 1;
  optional double tolerance = 2;    // 未设 → 0.1（SDK 默认）
}
message CheckReachedResponse {
  bool reached = 1;
  repeated double errors = 2;
}

// ============================================================
// 关节控制（v1）
// ============================================================

message JointMoveRequest {
  repeated double positions = 1;
  repeated double velocities = 2;
  repeated double max_torque = 3;   // 空 = 用配置默认 [21,36,36,21,10,10]
  bool wait = 4;                    // true → 模式 A（服务端非阻塞步进等待）
  optional double tolerance = 5;    // 未设 → 0.1
  optional double timeout_s = 6;    // 未设 → 15.0
}
message JointMoveResponse {
  bool accepted = 1;
  bool reached = 2;
  repeated double errors = 3;
  // SDK 越限只 return False 并打印，armd 必须自行结构化出
  // 「关节名 + 超限方向 + 限位值」（核实结论 §V5 前置说明）
  string reject_reason = 4;
}

message MoveJRequest {
  repeated double positions = 1;
  double duration_s = 2;
  repeated double max_torque = 3;
  bool wait = 4;
  optional double tolerance = 5;    // 未设 → 0.1
  optional double timeout_s = 6;    // 未设 → 15.0
}
message MoveJResponse {
  bool accepted = 1;
  bool reached = 2;
  repeated double errors = 3;
  string reject_reason = 4;
}

// 模式 C：新鲜度窗口是**唯一权威停止机制**（关节 250ms，§11）
message JointJogCommand { repeated double velocities = 1; }
message JointJogFeedback {
  JointState joint_state = 1;
  repeated bool limit_hit = 2;      // Joint_Vel 会在接近限位 0.02rad 时把该向速度置 0
}

// v2：MIT 阻抗
message JointMITCommand {
  repeated double positions = 1;
  repeated double velocities = 2;
  repeated double torques = 3;
  repeated double kp = 4;
  repeated double kd = 5;
}
message JointMITFeedback { JointState joint_state = 1; }

// ============================================================
// 夹爪控制
// ============================================================
// armd 直调 gripper_control 绕开 SDK 的 gripper_open/close 恒返回 None 缺陷
// （核实结论 N9），因此三者都能透传真实的成功/限位拒绝。
//
// N7 约束：夹爪与 6 关节共用一帧 CAN TX，armd 必须把夹爪指令表达成关节
// 当前所处的控制模式，不能跨模式下发。

message GripperMoveRequest {
  double position = 1;
  double velocity = 2;
  optional double max_torque = 3;   // 未设 → 0.5
}
message GripperOpenRequest {
  optional double position = 1;     // 未设 → 1.6（限位 [0,2] 内）
  optional double velocity = 2;     // 未设 → 0.5
  optional double max_torque = 3;   // 未设 → 0.5
}
message GripperCloseRequest {
  optional double position = 1;     // 未设 → 0.0
  optional double velocity = 2;     // 未设 → 0.5
  optional double max_torque = 3;   // 未设 → 0.5
}
message GripperMoveResponse {
  bool accepted = 1;
  string reject_reason = 2;         // 限位值 + 方向（G12）
}

// v2
message GripperMITCommand {
  double position = 1;
  double velocity = 2;
  double torque = 3;
  double kp = 4;
  double kd = 5;
}
message GripperMITResponse { bool accepted = 1; string reject_reason = 2; }

// ============================================================
// 运动学（v1，纯计算 → 计算 worker 进程）
// ============================================================

message JointAnglesOptional { repeated double joint_angles = 1; } // 空 = 用当前位置

message ForwardKinematicsResponse {
  repeated double position = 1;        // len 3
  repeated double rotation_matrix = 2; // len 9, row-major
  repeated double transform = 3;       // len 16, row-major 4x4
  repeated double used_joint_angles = 4;
}

message JacobianResponse {
  repeated double matrix = 1;          // row-major rows×cols
  int32 rows = 2;
  int32 cols = 3;
}
message ManipulabilityResponse { double mu = 1; }

message RPY { double roll = 1; double pitch = 2; double yaw = 3; }
message RotationMatrix { repeated double values = 1; } // len 9

message CartesianPose {
  repeated double position = 1;        // len 3
  oneof orientation {
    RPY rpy = 2;                       // 服务端用 rotation_matrix_from_euler 编码
    RotationMatrix matrix = 3;
  }
}

// 默认值已与 SDK 源码逐一核对一致（核实结论 §V1）——README 所载 eps=1e-4 是过时的。
message InverseKinematicsRequest {
  CartesianPose target = 1;
  repeated double init_q = 2;
  optional int32  max_iter = 3;         // 未设 → 1000
  optional double eps = 4;              // 未设 → 1e-3
  optional double damping = 5;          // 未设 → 1e-2
  optional bool   adaptive_damping = 6; // 未设 → true
  optional bool   multi_init = 7;       // 未设 → true
  optional int32  num_attempts = 8;     // 未设 → 8
  // 未设 → 0.5s。M0-3 实测：可达目标 p50 2.2ms，不可达最坏 170ms，
  // 原定 5s 过宽（FINAL_PLAN §V8）。
  optional double timeout_s = 9;
}
message InverseKinematicsResponse {
  bool found = 1;                       // SDK 返回 None → found=false
  repeated double joint_angles = 2;
  double error = 3;
  bool timeout = 4;
}

// ============================================================
// 笛卡尔运动（v1）
// ============================================================

message PlanCartesianPathRequest {
  repeated CartesianPose waypoints = 1;
  // **未实现**：SDK 的 compute_cartesian_path 接受该形参但函数体内从未引用它
  // （核实结论 N9），即恒不做碰撞检测。armd 恒忽略；CLI 已移除该选项以免误导。
  bool avoid_collisions = 2 [deprecated = true];
}
message JointTrajectoryPoint {
  repeated double positions = 1;
  repeated double velocities = 2;
  double timestamp_s = 3;
}
message PlanCartesianPathResponse {
  repeated JointTrajectoryPoint joint_trajectory = 1;
  double fraction = 2;                  // <1 表示只规划出部分路径
}

message MoveLRequest {
  CartesianPose target = 1;
  optional double duration_s = 2;       // 未设 → 按速度/加速度限制内部估算
  optional bool use_spline = 3;         // 未设 → true
  repeated double max_torque = 4;
}

// v2：笛卡尔速度 jog（新鲜度窗口建议 120ms，比关节 jog 更短）
message CartesianJogCommand {
  repeated double linear_velocity = 1;
  repeated double angular_velocity = 2;
  optional double damping = 3;          // 未设 → 0.01
}
message CartesianJogFeedback {
  JointState joint_state = 1;
  double manipulability = 2;            // 接近奇异时预警
}

// ============================================================
// 动力学（v2）
// ============================================================

enum DynamicsTerm {
  DYNAMICS_TERM_UNSPECIFIED = 0;
  DYNAMICS_TERM_GRAVITY = 1;
  DYNAMICS_TERM_CORIOLIS = 2;
  DYNAMICS_TERM_MASS_MATRIX = 3;
  DYNAMICS_TERM_INERTIA = 4;
  DYNAMICS_TERM_FULL_INVERSE_DYNAMICS = 5;
  DYNAMICS_TERM_FRICTION = 6;
}

message DynamicsQueryRequest {
  DynamicsTerm term = 1;
  repeated double q = 2;
  repeated double v = 3;
  repeated double a = 4;
  // FRICTION 用。SDK 的 get_friction_compensation 对 Fc/Fv 无默认值，缺参会
  // 直接抛异常（核实结论 N-#35）；armd 必须用配置默认值兜底：
  // Fc=[0.20,0.15,0.15,0.15,0.04,0.04] Fv=[0.06,0.06,0.06,0.03,0.02,0.02]
  repeated double fc = 5;
  repeated double fv = 6;
  optional double vel_threshold = 7;    // 未设 → 0.01
}
message DynamicsQueryResponse {
  repeated double gravity = 1;
  repeated double coriolis_matrix = 2;  // N×N row-major
  repeated double coriolis_vector = 3;
  repeated double mass_matrix = 4;      // N×N row-major
  repeated double inertia_terms = 5;
  repeated double inverse_dynamics = 6;
  repeated double friction_compensation = 7;
}

// ============================================================
// 多点轨迹（v2）
// ============================================================

message WaypointSpec {
  repeated double positions = 1;
  // 空 → 走 septic_interpolation（零边界速度）
  // 非空 → 走 septic_interpolation_with_velocity
  repeated double velocities = 2;
}
message RunJointTrajectoryRequest {
  repeated WaypointSpec waypoints = 1;
  repeated double durations = 2;        // len = waypoints-1
}

// ============================================================
// 示教录制回放（v2）
// ============================================================

message TeachStartRequest {
  // 自由拖动 = kp/kd 全零 + 重力/摩擦前馈（核实结论 §V5 §4b 配方）
  repeated double kp = 1;
  repeated double kd = 2;
  repeated double fc = 3;
  repeated double fv = 4;
}
message TeachStartResponse { bool accepted = 1; string reject_reason = 2; }
message TeachStopResponse { bool accepted = 1; }

message TeachRecordStartRequest {
  string path = 1;                      // 空 → trajectory_%Y%m%d_%H%M%S.jsonl
  optional double flush_interval = 2;   // 未设 → 0.2
}
message TeachRecordStartResponse { bool accepted = 1; string path = 2; }
message TeachRecordStopResponse { bool accepted = 1; string saved_path = 2; int64 frame_count = 3; }

enum PlaybackMode {
  PLAYBACK_MODE_UNSPECIFIED = 0;
  PLAYBACK_MODE_MIT = 1;
  PLAYBACK_MODE_POSVEL = 2;
}

message TeachPlayRequest {
  string path = 1;                      // armd/WSL 端路径，由 TeachList 列举
  repeated double kp = 2;
  repeated double kd = 3;
  repeated double fc = 4;
  repeated double fv = 5;
  // 未设 → 0.0。注意与 DynamicsQuery.vel_threshold 的 0.01 **不同**，
  // 这是 SDK Recorder.play 自己的默认值（核实结论 §V5）。
  optional double vel_threshold = 6;
  repeated double tau_limit = 7;
  optional double gripper_kp = 8;       // 未设 → 5.0
  optional double gripper_kd = 9;       // 未设 → 0.5
  optional double playback_dt = 10;     // 未设 → 0.01
  optional int32  smooth_window = 11;   // 未设 → 7（偶数会被+1变奇数）
  PlaybackMode mode = 12;               // 未设 → MIT
}

message TeachFileInfo {
  string path = 1;
  int64 recorded_at = 2;
  double duration_s = 3;
  int64 frame_count = 4;
}
message TeachListResponse { repeated TeachFileInfo files = 1; }

// ============================================================
// 守护进程自身
// ============================================================

message DaemonStatus {
  string version = 1;
  bool sim = 2;                         // 是否 --sim 仿真后端
  double control_hz = 3;                // 实测控制循环频率
  int64 uptime_ms = 4;
  string sdk_version = 5;
  // N1 回归检查：SDK 的 detect_motor_limit() 若被接入调用链，限位latch会
  // 使 motor_send_cmd()（进而 set_stop()）静默失效。armd 启动自检该结论。
  bool estop_latch_hazard_present = 6;
  bool hardware_connected = 7;
}

// ============================================================
// 占位（v2 路线图，正式契约独立成 camera.proto / dataset.proto）
// ============================================================

message CameraStreamRequest { string encode = 1; }
message DatasetExportRequest { string traj_path = 1; string out_dir = 2; }

// ============================================================
// Service
// ============================================================

service ArmService {
  // ---------- 控制权 / 安全（§3.2 持锁分层）----------
  rpc AcquireControl(AcquireControlRequest) returns (AcquireControlResponse);   // 特例
  rpc ReleaseControl(Empty) returns (Empty);                                    // 特例
  rpc GetControlStatus(Empty) returns (ControlStatus);                          // 只读
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);    // 只读
  rpc EStop(EStopRequest) returns (EStopResponse);                              // **不需持锁**
  rpc ClearEStop(ClearEStopRequest) returns (EStopResponse);                    // 需持锁 + confirm
  rpc GetSoftLimits(Empty) returns (SoftLimits);                                // 只读
  rpc SetZero(SetZeroRequest) returns (SetZeroResponse);                        // 需持锁 + confirm

  // ---------- 状态（全部只读，无需 lease）----------
  rpc GetJointState(Empty) returns (JointState);
  rpc GetGripperState(Empty) returns (GripperState);
  rpc StreamState(StreamStateRequest) returns (stream RobotState);
  rpc CheckReached(CheckReachedRequest) returns (CheckReachedResponse);
  rpc GetDaemonStatus(Empty) returns (DaemonStatus);

  // ---------- 关节控制（需 lease）----------
  rpc JointMove(JointMoveRequest) returns (JointMoveResponse);
  rpc MoveJ(MoveJRequest) returns (MoveJResponse);
  rpc JointJog(stream JointJogCommand) returns (stream JointJogFeedback);
  rpc JointMIT(stream JointMITCommand) returns (stream JointMITFeedback);       // v2

  // ---------- 夹爪（需 lease）----------
  rpc GripperMove(GripperMoveRequest) returns (GripperMoveResponse);
  rpc GripperOpen(GripperOpenRequest) returns (GripperMoveResponse);
  rpc GripperClose(GripperCloseRequest) returns (GripperMoveResponse);
  rpc GripperMIT(GripperMITCommand) returns (GripperMITResponse);               // v2

  // ---------- 运动学（只读，走计算 worker 进程）----------
  rpc GetForwardKinematics(JointAnglesOptional) returns (ForwardKinematicsResponse);
  rpc GetJacobian(JointAnglesOptional) returns (JacobianResponse);
  rpc GetManipulability(JointAnglesOptional) returns (ManipulabilityResponse);
  rpc GetInverseKinematics(InverseKinematicsRequest) returns (InverseKinematicsResponse);

  // ---------- 笛卡尔 ----------
  rpc PlanCartesianPath(PlanCartesianPathRequest) returns (PlanCartesianPathResponse); // 只读 dry-run
  rpc MoveL(MoveLRequest) returns (ExecutionAccepted);                          // 需 lease，模式 B
  rpc CartesianJog(stream CartesianJogCommand) returns (stream CartesianJogFeedback);  // v2

  // ---------- 动力学（只读，v2）----------
  rpc GetDynamicsTerm(DynamicsQueryRequest) returns (DynamicsQueryResponse);

  // ---------- 多点轨迹（需 lease，v2）----------
  rpc RunJointTrajectory(RunJointTrajectoryRequest) returns (ExecutionAccepted);

  // ---------- 示教录制回放（v2）----------
  rpc TeachStart(TeachStartRequest) returns (TeachStartResponse);               // 需 lease
  rpc TeachStop(Empty) returns (TeachStopResponse);                             // 需 lease
  rpc TeachRecordStart(TeachRecordStartRequest) returns (TeachRecordStartResponse); // 需 lease
  rpc TeachRecordStop(Empty) returns (TeachRecordStopResponse);                 // 需 lease
  rpc TeachPlay(TeachPlayRequest) returns (ExecutionAccepted);                  // 需 lease，模式 B
  rpc TeachList(Empty) returns (TeachListResponse);                             // 只读

  // ---------- 通用异步执行观察（moveL / trajectory / teach play 共用）----------
  rpc StreamExecution(StreamExecutionRequest) returns (stream ExecutionStatus); // 只读
  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse);// 需 lease

  // ---------- 占位（详见未来 camera.proto / dataset.proto）----------
  rpc StreamCamera(CameraStreamRequest) returns (stream Empty);
  rpc ExportLeRobotDataset(DatasetExportRequest) returns (ExecutionAccepted);
}
