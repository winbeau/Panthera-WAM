<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panthera-HT 控制终端 — Fluent 工程控制台</title>
<style>
/* ============================================================
   Panthera-HT 控制终端 · 变体 A · 工程密集控制台
   Microsoft Fluent 2 设计语言 · 三主题 · 自包含无外部资源
   ============================================================ */

/* ---------- 主题变量：浅色为基线 ---------- */
:root{
  --font-ui: "Segoe UI Variable","Segoe UI","Microsoft YaHei UI",system-ui,-apple-system,sans-serif;
  --font-mono: "Cascadia Mono","Consolas","SFMono-Regular",ui-monospace,"Segoe UI Variable",monospace;

  /* 层次背景 (Fluent Mica/Layer) */
  --bg-app: #eaeaea;
  --bg-window: #f3f3f3;
  --bg-layer: #ffffff;
  --bg-layer-alt: #fafafa;
  --bg-subtle: #f5f5f5;

  /* 描边 */
  --stroke-card: #e2e2e2;
  --stroke-divider: rgba(0,0,0,0.08);
  --stroke-control: rgba(0,0,0,0.14);
  --stroke-control-strong: rgba(0,0,0,0.45);

  /* 控件填充 */
  --fill-control: #ffffff;
  --fill-control-hover: #f6f6f6;
  --fill-control-pressed: #f0f0f0;
  --fill-control-disabled: #f5f5f5;
  --fill-subtle-hover: rgba(0,0,0,0.037);
  --fill-subtle-pressed: rgba(0,0,0,0.058);
  --fill-selected: rgba(0,103,192,0.09);

  /* 文本 */
  --text-primary: #1a1a1a;
  --text-secondary: #5c5c5c;
  --text-tertiary: #868686;
  --text-disabled: #a6a6a6;
  --text-on-accent: #ffffff;

  /* Accent 蓝 (#0067C0 系) */
  --accent: #0067c0;
  --accent-hover: #005ba1;
  --accent-pressed: #004e88;
  --accent-tint: #cfe4f7;
  --accent-text: #0067c0;

  /* 语义 */
  --ok: #0f7b34;
  --ok-bg: rgba(15,123,52,0.10);
  --warn: #9d5d00;
  --warn-fill: #c78100;
  --warn-bg: rgba(157,93,0,0.10);
  --danger: #c42b1c;
  --danger-hover: #b12719;
  --danger-pressed: #9c2117;
  --danger-bg: rgba(196,43,28,0.10);
  --info: #0067c0;

  /* 遥测条颜色 */
  --bar-angle: #0067c0;
  --bar-vel: #0a7d94;
  --bar-track: rgba(0,0,0,0.07);
  --bar-center: rgba(0,0,0,0.28);

  --shadow-card: 0 1px 2px rgba(0,0,0,0.055), 0 1.5px 5px rgba(0,0,0,0.045);
  --shadow-flyout: 0 4px 12px rgba(0,0,0,0.14);
  --focus-ring: #0067c0;
}

/* 系统深色（跟随 prefers-color-scheme） */
@media (prefers-color-scheme: dark){
  :root{
    --bg-app: #1c1c1c;
    --bg-window: #202020;
    --bg-layer: #2b2b2b;
    --bg-layer-alt: #262626;
    --bg-subtle: #303030;

    --stroke-card: #1a1a1a;
    --stroke-divider: rgba(255,255,255,0.07);
    --stroke-control: rgba(255,255,255,0.10);
    --stroke-control-strong: rgba(255,255,255,0.55);

    --fill-control: rgba(255,255,255,0.055);
    --fill-control-hover: rgba(255,255,255,0.085);
    --fill-control-pressed: rgba(255,255,255,0.033);
    --fill-control-disabled: rgba(255,255,255,0.03);
    --fill-subtle-hover: rgba(255,255,255,0.06);
    --fill-subtle-pressed: rgba(255,255,255,0.036);
    --fill-selected: rgba(71,158,245,0.16);

    --text-primary: #ffffff;
    --text-secondary: #cfcfcf;
    --text-tertiary: #969696;
    --text-disabled: #6f6f6f;
    --text-on-accent: #ffffff;

    --accent: #479ef5;
    --accent-hover: #62a9f6;
    --accent-pressed: #3d8be0;
    --accent-tint: #12385e;
    --accent-text: #6cb2f7;

    --ok: #5ec06a;
    --ok-bg: rgba(94,192,106,0.14);
    --warn: #e2a336;
    --warn-fill: #e2a336;
    --warn-bg: rgba(226,163,54,0.15);
    --danger: #f26057;
    --danger-hover: #f4726a;
    --danger-pressed: #d8534b;
    --danger-bg: rgba(242,96,87,0.16);
    --info: #6cb2f7;

    --bar-angle: #479ef5;
    --bar-vel: #38b6cf;
    --bar-track: rgba(255,255,255,0.10);
    --bar-center: rgba(255,255,255,0.32);

    --shadow-card: 0 1px 2px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.30);
    --shadow-flyout: 0 6px 16px rgba(0,0,0,0.5);
    --focus-ring: #62a9f6;
  }
}

/* 显式浅色（覆盖系统深色） */
:root[data-theme="light"]{
  --bg-app:#eaeaea; --bg-window:#f3f3f3; --bg-layer:#ffffff; --bg-layer-alt:#fafafa; --bg-subtle:#f5f5f5;
  --stroke-card:#e2e2e2; --stroke-divider:rgba(0,0,0,0.08); --stroke-control:rgba(0,0,0,0.14); --stroke-control-strong:rgba(0,0,0,0.45);
  --fill-control:#ffffff; --fill-control-hover:#f6f6f6; --fill-control-pressed:#f0f0f0; --fill-control-disabled:#f5f5f5;
  --fill-subtle-hover:rgba(0,0,0,0.037); --fill-subtle-pressed:rgba(0,0,0,0.058); --fill-selected:rgba(0,103,192,0.09);
  --text-primary:#1a1a1a; --text-secondary:#5c5c5c; --text-tertiary:#868686; --text-disabled:#a6a6a6; --text-on-accent:#ffffff;
  --accent:#0067c0; --accent-hover:#005ba1; --accent-pressed:#004e88; --accent-tint:#cfe4f7; --accent-text:#0067c0;
  --ok:#0f7b34; --ok-bg:rgba(15,123,52,0.10); --warn:#9d5d00; --warn-fill:#c78100; --warn-bg:rgba(157,93,0,0.10);
  --danger:#c42b1c; --danger-hover:#b12719; --danger-pressed:#9c2117; --danger-bg:rgba(196,43,28,0.10); --info:#0067c0;
  --bar-angle:#0067c0; --bar-vel:#0a7d94; --bar-track:rgba(0,0,0,0.07); --bar-center:rgba(0,0,0,0.28);
  --shadow-card:0 1px 2px rgba(0,0,0,0.055),0 1.5px 5px rgba(0,0,0,0.045); --shadow-flyout:0 4px 12px rgba(0,0,0,0.14); --focus-ring:#0067c0;
}

/* 显式深色（覆盖系统浅色） */
:root[data-theme="dark"]{
  --bg-app:#1c1c1c; --bg-window:#202020; --bg-layer:#2b2b2b; --bg-layer-alt:#262626; --bg-subtle:#303030;
  --stroke-card:#1a1a1a; --stroke-divider:rgba(255,255,255,0.07); --stroke-control:rgba(255,255,255,0.10); --stroke-control-strong:rgba(255,255,255,0.55);
  --fill-control:rgba(255,255,255,0.055); --fill-control-hover:rgba(255,255,255,0.085); --fill-control-pressed:rgba(255,255,255,0.033); --fill-control-disabled:rgba(255,255,255,0.03);
  --fill-subtle-hover:rgba(255,255,255,0.06); --fill-subtle-pressed:rgba(255,255,255,0.036); --fill-selected:rgba(71,158,245,0.16);
  --text-primary:#ffffff; --text-secondary:#cfcfcf; --text-tertiary:#969696; --text-disabled:#6f6f6f; --text-on-accent:#ffffff;
  --accent:#479ef5; --accent-hover:#62a9f6; --accent-pressed:#3d8be0; --accent-tint:#12385e; --accent-text:#6cb2f7;
  --ok:#5ec06a; --ok-bg:rgba(94,192,106,0.14); --warn:#e2a336; --warn-fill:#e2a336; --warn-bg:rgba(226,163,54,0.15);
  --danger:#f26057; --danger-hover:#f4726a; --danger-pressed:#d8534b; --danger-bg:rgba(242,96,87,0.16); --info:#6cb2f7;
  --bar-angle:#479ef5; --bar-vel:#38b6cf; --bar-track:rgba(255,255,255,0.10); --bar-center:rgba(255,255,255,0.32);
  --shadow-card:0 1px 2px rgba(0,0,0,0.35),0 2px 6px rgba(0,0,0,0.30); --shadow-flyout:0 6px 16px rgba(0,0,0,0.5); --focus-ring:#62a9f6;
}

/* ---------- 基础重置 ---------- */
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;margin:0;overflow:hidden;}
body{
  font-family:var(--font-ui);
  font-size:13px;
  color:var(--text-primary);
  background:var(--bg-app);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;color:inherit;cursor:pointer;}
:focus{outline:none;}
:focus-visible{outline:2px solid var(--focus-ring);outline-offset:1px;border-radius:4px;}
::selection{background:var(--accent);color:#fff;}

/* 细滚动条 */
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-thumb{background:var(--stroke-control-strong);border-radius:6px;border:3px solid transparent;background-clip:padding-box;}
*::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary);background-clip:padding-box;}
*::-webkit-scrollbar-track{background:transparent;}

/* ============================================================
   应用外壳
   ============================================================ */
.app{
  height:100%;
  display:flex;
  flex-direction:column;
  background:var(--bg-window);
  min-width:0;
}

/* ---------- 顶栏 ---------- */
.titlebar{
  height:48px;
  flex:0 0 48px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 12px 0 14px;
  background:var(--bg-layer);
  border-bottom:1px solid var(--stroke-divider);
  position:relative;
  z-index:5;
}
.brand{display:flex;align-items:center;gap:9px;flex:0 0 auto;}
.brand-mark{
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#0067c0,#004e88);
  color:#fff;flex:0 0 auto;
}
:root[data-theme="dark"] .brand-mark, :root:not([data-theme="light"]) .brand-mark{}
.brand-name{font-size:13.5px;font-weight:600;letter-spacing:.1px;white-space:nowrap;}
.brand-sub{font-size:11px;color:var(--text-tertiary);white-space:nowrap;font-family:var(--font-mono);}

.tb-sep{width:1px;height:22px;background:var(--stroke-divider);flex:0 0 auto;}

/* 状态胶囊 */
.pill{
  display:inline-flex;align-items:center;gap:6px;
  height:26px;padding:0 10px;border-radius:13px;
  font-size:12px;font-weight:500;white-space:nowrap;
  border:1px solid var(--stroke-control);
  background:var(--fill-control);
}
.pill svg{width:14px;height:14px;flex:0 0 auto;}
.pill.ok{color:var(--ok);background:var(--ok-bg);border-color:transparent;}
.pill.ctrl{color:var(--accent-text);background:var(--fill-selected);border-color:transparent;}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.dot.live{background:var(--ok);box-shadow:0 0 0 0 rgba(15,123,52,.5);animation:pulse 2.4s ease-out infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(15,123,52,.45);}70%{box-shadow:0 0 0 5px rgba(15,123,52,0);}100%{box-shadow:0 0 0 0 rgba(15,123,52,0);}}

.tb-spacer{flex:1 1 auto;}

/* Fluent 开关 */
.toggle-wrap{display:flex;align-items:center;gap:9px;flex:0 0 auto;}
.toggle-label{font-size:12.5px;color:var(--text-secondary);white-space:nowrap;}
.switch{position:relative;width:40px;height:20px;flex:0 0 auto;}
.switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
.switch .track{
  position:absolute;inset:0;border-radius:10px;
  border:1px solid var(--stroke-control-strong);
  background:transparent;transition:background .12s,border-color .12s;
}
.switch .knob{
  position:absolute;top:50%;left:4px;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;
  background:var(--stroke-control-strong);
  transition:left .13s cubic-bezier(.4,0,.2,1),width .13s,background .12s;
}
.switch input:hover + .track{background:var(--fill-subtle-hover);}
.switch input:checked + .track{background:var(--accent);border-color:var(--accent);}
.switch input:checked + .track .knob,
.switch input:checked ~ .knob{left:23px;background:#fff;}
.switch input:checked:hover + .track{background:var(--accent-hover);border-color:var(--accent-hover);}
.switch input:focus-visible + .track{outline:2px solid var(--focus-ring);outline-offset:2px;}

/* 急停按钮 */
.estop{
  display:inline-flex;align-items:center;gap:8px;
  height:34px;padding:0 16px 0 12px;border-radius:6px;
  border:1px solid var(--danger-pressed);
  background:var(--danger);color:#fff;
  font-size:13px;font-weight:600;letter-spacing:.3px;
  box-shadow:0 1px 2px rgba(196,43,28,.35);
  transition:background .1s,transform .04s;
  flex:0 0 auto;
}
.estop svg{width:17px;height:17px;}
.estop:hover{background:var(--danger-hover);}
.estop:active{background:var(--danger-pressed);transform:translateY(.5px);}
.estop .kbd{font-size:10px;opacity:.85;font-weight:500;border:1px solid rgba(255,255,255,.5);border-radius:3px;padding:0 4px;line-height:14px;font-family:var(--font-mono);}

/* 图标按钮 */
.iconbtn{
  width:32px;height:32px;border-radius:4px;border:none;background:transparent;
  display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);
  transition:background .1s,color .1s;flex:0 0 auto;
}
.iconbtn svg{width:18px;height:18px;}
.iconbtn:hover{background:var(--fill-subtle-hover);color:var(--text-primary);}
.iconbtn:active{background:var(--fill-subtle-pressed);}

/* 主题分段控件 */
.segmented{
  display:inline-flex;align-items:center;gap:2px;
  padding:2px;border-radius:6px;
  background:var(--bg-subtle);
  border:1px solid var(--stroke-divider);
  flex:0 0 auto;
}
.segmented button{
  height:26px;padding:0 9px;border:none;border-radius:4px;background:transparent;
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--text-secondary);
  transition:background .1s,color .1s;
}
.segmented button svg{width:14px;height:14px;}
.segmented button:hover{background:var(--fill-subtle-hover);color:var(--text-primary);}
.segmented button[aria-pressed="true"]{
  background:var(--fill-control);color:var(--accent-text);font-weight:600;
  box-shadow:var(--shadow-card);
}

/* ---------- 工作区网格（dock 式） ---------- */
.workspace{
  flex:1 1 auto;min-height:0;
  display:grid;
  grid-template-columns:minmax(0,1.55fr) minmax(0,1fr) minmax(0,1.12fr);
  gap:8px;padding:8px;
}
.dockcol{display:flex;flex-direction:column;gap:8px;min-height:0;min-width:0;}

/* 面板卡片 */
.panel{
  background:var(--bg-layer);
  border:1px solid var(--stroke-card);
  border-radius:8px;
  box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;min-height:0;min-width:0;
  overflow:hidden;
}
.panel.grow{flex:1 1 auto;}
.panel-hd{
  flex:0 0 auto;
  height:34px;display:flex;align-items:center;gap:8px;
  padding:0 10px 0 12px;
  border-bottom:1px solid var(--stroke-divider);
  background:var(--bg-layer-alt);
}
.panel-hd .htitle{font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--text-primary);display:flex;align-items:center;gap:7px;}
.panel-hd .htitle svg{width:15px;height:15px;color:var(--accent-text);}
.panel-hd .hmeta{margin-left:auto;font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);white-space:nowrap;}
.panel-bd{flex:1 1 auto;min-height:0;overflow:auto;padding:10px 12px 12px;}

/* ============================================================
   关节监控表
   ============================================================ */
.jt{width:100%;border-collapse:collapse;font-size:12px;}
.jt thead th{
  position:sticky;top:0;background:var(--bg-layer);
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-tertiary);text-align:left;
  padding:0 8px 7px;white-space:nowrap;border-bottom:1px solid var(--stroke-divider);
}
.jt thead th.num{text-align:right;}
.jt tbody td{padding:8px;border-bottom:1px solid var(--stroke-divider);vertical-align:middle;}
.jt tbody tr:last-child td{border-bottom:none;}
.jt tbody tr:hover{background:var(--fill-subtle-hover);}
.jt .jname{font-weight:600;font-size:12.5px;color:var(--text-primary);white-space:nowrap;}
.jt .jname small{display:block;font-weight:400;font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);}
.jt .val{font-family:var(--font-mono);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;color:var(--text-primary);font-size:12.5px;}
.jt .val .u{color:var(--text-tertiary);font-size:10px;margin-left:2px;}
.jt .barcell{width:88px;padding-right:12px;}

/* 双极遥测条（中心=0） */
.bibar{position:relative;height:6px;border-radius:3px;background:var(--bar-track);overflow:hidden;}
.bibar::before{content:"";position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:var(--bar-center);}
.bibar .fill{position:absolute;top:0;bottom:0;border-radius:2px;transition:left .18s linear,width .18s linear,background .18s;}
/* 单极条（力矩） */
.unibar{position:relative;height:6px;border-radius:3px;background:var(--bar-track);overflow:hidden;}
.unibar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px;transition:width .18s linear,background .18s;}

.jstat{display:inline-flex;align-items:center;justify-content:center;height:19px;padding:0 7px;border-radius:10px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.jstat.hold{color:var(--ok);background:var(--ok-bg);}
.jstat.warn{color:var(--warn);background:var(--warn-bg);}

/* 夹爪 */
.gripper{display:flex;flex-direction:column;gap:10px;}
.grip-read{display:flex;align-items:baseline;gap:10px;}
.grip-read .big{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:26px;font-weight:600;letter-spacing:-.5px;}
.grip-read .sub{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);}
.grip-track{position:relative;height:22px;border-radius:5px;background:var(--bar-track);border:1px solid var(--stroke-divider);overflow:hidden;}
.grip-track .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .25s cubic-bezier(.4,0,.2,1);opacity:.9;}
.grip-track .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--stroke-divider);}
.grip-actions{display:flex;gap:6px;}

/* ============================================================
   Jog 点动面板
   ============================================================ */
.jog-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.field-lbl{font-size:11px;color:var(--text-secondary);white-space:nowrap;}
.chipset{display:inline-flex;background:var(--bg-subtle);border:1px solid var(--stroke-divider);border-radius:5px;padding:2px;gap:2px;}
.chipset button{height:24px;padding:0 9px;border:none;border-radius:3px;background:transparent;font-family:var(--font-mono);font-size:11.5px;color:var(--text-secondary);transition:background .1s,color .1s;}
.chipset button:hover{background:var(--fill-subtle-hover);color:var(--text-primary);}
.chipset button[aria-pressed="true"]{background:var(--fill-control);color:var(--accent-text);font-weight:600;box-shadow:var(--shadow-card);}

.jog-grid{display:flex;flex-direction:column;gap:6px;}
.jog-row{display:grid;grid-template-columns:52px 1fr 1fr auto;align-items:center;gap:6px;}
.jog-row .jl{font-size:12px;font-weight:600;}
.jog-row .jl small{display:block;font-weight:400;font-size:9.5px;color:var(--text-tertiary);font-family:var(--font-mono);}
.jogbtn{
  height:30px;border-radius:4px;border:1px solid var(--stroke-control);
  background:var(--fill-control);color:var(--text-primary);
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  font-size:12px;font-family:var(--font-mono);
  transition:background .08s,border-color .08s,transform .04s;
  user-select:none;
}
.jogbtn svg{width:13px;height:13px;}
.jogbtn:hover{background:var(--fill-control-hover);border-color:var(--stroke-control-strong);}
.jogbtn:active,.jogbtn.holding{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(.5px);}
.jog-row .cur{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:11.5px;color:var(--text-secondary);text-align:right;min-width:58px;white-space:nowrap;}

/* ============================================================
   笛卡尔面板
   ============================================================ */
.cart-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:12px;}
.cart-cell{display:flex;flex-direction:column;gap:3px;}
.cart-cell .lb{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.4px;}
.cart-cell .lb .u{font-family:var(--font-mono);text-transform:none;letter-spacing:0;}
.cart-cell .cv{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:-.3px;}
.cart-sub{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;margin:2px 0 8px;display:flex;align-items:center;gap:6px;}
.cart-sub::after{content:"";flex:1;height:1px;background:var(--stroke-divider);}

.tgt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.inp-field{display:flex;flex-direction:column;gap:4px;}
.inp-field label{font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;}
.inp-field label .u{color:var(--text-tertiary);font-family:var(--font-mono);font-size:10px;}
.tinp{
  height:30px;border-radius:4px;padding:0 9px;
  border:1px solid var(--stroke-control);
  border-bottom:1px solid var(--stroke-control-strong);
  background:var(--fill-control);color:var(--text-primary);
  font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:12.5px;
  transition:border-color .1s;width:100%;
}
.tinp:hover{border-color:var(--stroke-control-strong);}
.tinp:focus{border-bottom:2px solid var(--accent);padding-bottom:0;outline:none;}

.cart-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* 通用按钮 */
.btn{
  height:32px;padding:0 14px;border-radius:4px;
  border:1px solid var(--stroke-control);
  border-bottom-color:var(--stroke-control-strong);
  background:var(--fill-control);color:var(--text-primary);
  font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:background .09s,border-color .09s;
}
.btn svg{width:15px;height:15px;}
.btn:hover{background:var(--fill-control-hover);}
.btn:active{background:var(--fill-control-pressed);color:var(--text-secondary);}
.btn-accent{background:var(--accent);border-color:transparent;color:var(--text-on-accent);}
.btn-accent:hover{background:var(--accent-hover);}
.btn-accent:active{background:var(--accent-pressed);color:rgba(255,255,255,.85);}
.btn-ghost{background:transparent;border-color:var(--stroke-control);font-weight:500;}
.btn-ghost:hover{background:var(--fill-subtle-hover);}
.speed-inline{display:inline-flex;align-items:center;gap:6px;margin-left:auto;font-size:11px;color:var(--text-tertiary);white-space:nowrap;}
.speed-inline b{color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;}

/* ============================================================
   底部日志条
   ============================================================ */
.logbar{
  flex:0 0 auto;height:132px;
  display:flex;flex-direction:column;
  background:var(--bg-layer);
  border-top:1px solid var(--stroke-divider);
}
.log-hd{
  height:30px;flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:0 12px;border-bottom:1px solid var(--stroke-divider);
}
.log-hd .lt{font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--text-secondary);}
.log-hd .lt svg{width:14px;height:14px;color:var(--accent-text);}
.log-filters{display:flex;gap:4px;margin-left:6px;}
.lchip{height:20px;padding:0 8px;border-radius:10px;border:1px solid var(--stroke-divider);background:transparent;font-size:10.5px;color:var(--text-secondary);transition:background .1s;}
.lchip[aria-pressed="true"]{background:var(--fill-selected);color:var(--accent-text);border-color:transparent;font-weight:600;}
.lchip:hover{background:var(--fill-subtle-hover);}
.log-hd .rate{margin-left:auto;font-size:10.5px;color:var(--text-tertiary);font-family:var(--font-mono);display:flex;align-items:center;gap:6px;}
.log-body{
  flex:1 1 auto;overflow-y:auto;padding:6px 12px 8px;
  font-family:var(--font-mono);font-size:11.5px;line-height:1.62;
}
.logln{display:flex;gap:10px;white-space:nowrap;}
.logln .ts{color:var(--text-tertiary);flex:0 0 auto;}
.logln .lv{flex:0 0 46px;font-weight:600;}
.logln .lv.INFO{color:var(--text-tertiary);}
.logln .lv.MOVE{color:var(--accent-text);}
.logln .lv.WARN{color:var(--warn);}
.logln .lv.ERR{color:var(--danger);}
.logln .msg{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;}
.logln .msg .hl{color:var(--text-primary);}

@media (max-width:1120px){
  .workspace{grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);}
  .dockcol.col3{grid-column:1 / -1;}
}
</style>
</head>
<body>
<div class="app">

  <!-- ================= 顶栏 ================= -->
  <header class="titlebar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M12 3v4M12 21v-3M5 8l2.5 2M17 8l-2.5 2M4 15h3M17 15h3"/><circle cx="12" cy="13" r="3.2"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Panthera-HT 控制终端</div>
        <div class="brand-sub">6-DoF · armd v1</div>
      </div>
    </div>

    <div class="tb-sep"></div>

    <span class="pill ok" title="gRPC localhost:50051">
      <span class="dot live"></span>已连接 · 200 Hz
    </span>
    <span class="pill ctrl" title="控制权互斥">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      控制权 · 本终端
    </span>

    <div class="tb-spacer"></div>

    <div class="toggle-wrap">
      <span class="toggle-label">伺服使能</span>
      <label class="switch" title="Enable / Disable">
        <input type="checkbox" id="enableToggle" checked aria-label="伺服使能">
        <span class="track"></span>
        <span class="knob"></span>
      </label>
    </div>

    <button class="estop" id="estopBtn" title="紧急停止 — 直通硬件">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 3h7L21 8.5v7L15.5 21h-7L3 15.5v-7L8.5 3Z"/><path d="M12 8v5M12 16.2v.1"/></svg>
      急停
      <span class="kbd">ESC</span>
    </button>

    <div class="tb-sep"></div>

    <div class="segmented" role="group" aria-label="主题">
      <button data-theme-set="system" aria-pressed="false" title="跟随系统">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>系统
      </button>
      <button data-theme-set="light" aria-pressed="false" title="浅色">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>浅色
      </button>
      <button data-theme-set="dark" aria-pressed="false" title="深色">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5Z"/></svg>深色
      </button>
    </div>
  </header>

  <!-- ================= 工作区 ================= -->
  <main class="workspace">

    <!-- ---- 列 1：关节监控 ---- -->
    <div class="dockcol">
      <section class="panel grow">
        <div class="panel-hd">
          <span class="htitle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="1.6" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="1.6" fill="currentColor" stroke="none"/></svg>
            关节实时状态
          </span>
          <span class="hmeta" id="loopMeta">HardwareLoop · 4.98 ms/tick</span>
        </div>
        <div class="panel-bd">
          <table class="jt">
            <thead>
              <tr>
                <th>关节</th>
                <th class="num">角度 <span style="font-family:var(--font-mono);color:inherit">rad</span></th>
                <th>位置</th>
                <th class="num">速度 <span style="font-family:var(--font-mono)">rad/s</span></th>
                <th>速度</th>
                <th class="num">力矩 <span style="font-family:var(--font-mono)">N·m</span></th>
                <th>负载</th>
                <th class="num">状态</th>
              </tr>
            </thead>
            <tbody id="jointBody"><!-- JS 注入 --></tbody>
          </table>
        </div>
      </section>
    </div>

    <!-- ---- 列 2：Jog + 夹爪 ---- -->
    <div class="dockcol">
      <section class="panel grow">
        <div class="panel-hd">
          <span class="htitle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M7 8l5-5 5 5M7 16l5 5 5-5"/></svg>
            关节点动 Jog
          </span>
          <span class="hmeta">按住持续 · 松开停止</span>
        </div>
        <div class="panel-bd">
          <div class="jog-toolbar">
            <span class="field-lbl">步进</span>
            <div class="chipset" id="stepChips" role="group" aria-label="步进角度">
              <button data-step="0.005" aria-pressed="false">0.005</button>
              <button data-step="0.02" aria-pressed="true">0.02</button>
              <button data-step="0.05" aria-pressed="false">0.05</button>
              <button data-step="0.1" aria-pressed="false">0.10</button>
            </div>
            <span class="field-lbl" style="margin-left:2px;font-family:var(--font-mono)">rad</span>
          </div>
          <div class="jog-grid" id="jogGrid"><!-- JS 注入 --></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-hd">
          <span class="htitle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v6M7 10a3 3 0 0 0 3 3h4a3 3 0 0 0 3-3M17 4v6M10 20h4"/><path d="M12 13v7"/></svg>
            夹爪
          </span>
          <span class="hmeta">行程 0 – 85 mm</span>
        </div>
        <div class="panel-bd">
          <div class="gripper">
            <div class="grip-read">
              <span class="big" id="gripPct">62</span><span style="font-size:14px;color:var(--text-secondary);margin-left:-4px">%</span>
              <span class="sub" id="gripMm">52.7 mm 开度 · 抓取力 24 N</span>
            </div>
            <div class="grip-track">
              <div class="fill" id="gripFill" style="width:62%"></div>
              <div class="tick" style="left:25%"></div><div class="tick" style="left:50%"></div><div class="tick" style="left:75%"></div>
            </div>
            <div class="grip-actions">
              <button class="btn btn-ghost" id="gripOpen" style="flex:1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6L4 12l5 6M15 6l5 6-5 6"/></svg>张开
              </button>
              <button class="btn btn-ghost" id="gripClose" style="flex:1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6l5 6-5 6M19 6l-5 6 5 6"/></svg>闭合
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- ---- 列 3：笛卡尔 ---- -->
    <div class="dockcol col3">
      <section class="panel grow">
        <div class="panel-hd">
          <span class="htitle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
            笛卡尔末端位姿
          </span>
          <span class="hmeta">TCP · base 坐标系</span>
        </div>
        <div class="panel-bd">
          <div class="cart-sub">当前位姿</div>
          <div class="cart-grid" id="poseGrid"><!-- JS 注入 --></div>

          <div class="cart-sub">目标位姿</div>
          <div class="tgt-grid">
            <div class="inp-field"><label>X <span class="u">m</span></label><input class="tinp" value="0.4230" spellcheck="false"></div>
            <div class="inp-field"><label>Y <span class="u">m</span></label><input class="tinp" value="-0.0380" spellcheck="false"></div>
            <div class="inp-field"><label>Z <span class="u">m</span></label><input class="tinp" value="0.3050" spellcheck="false"></div>
            <div class="inp-field"><label>Roll <span class="u">rad</span></label><input class="tinp" value="3.1416" spellcheck="false"></div>
            <div class="inp-field"><label>Pitch <span class="u">rad</span></label><input class="tinp" value="0.0000" spellcheck="false"></div>
            <div class="inp-field"><label>Yaw <span class="u">rad</span></label><input class="tinp" value="-1.5708" spellcheck="false"></div>
          </div>

          <div class="cart-actions">
            <button class="btn btn-accent" id="moveJ">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18c4-9 12-9 16 0" stroke-dasharray="0.1 3"/><circle cx="4" cy="18" r="1.8" fill="currentColor" stroke="none"/><circle cx="20" cy="18" r="1.8" fill="currentColor" stroke="none"/></svg>
              moveJ
            </button>
            <button class="btn" id="moveL">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L20 6"/><circle cx="4" cy="18" r="1.8" fill="currentColor" stroke="none"/><circle cx="20" cy="6" r="1.8" fill="currentColor" stroke="none"/></svg>
              moveL
            </button>
            <div class="speed-inline">速度 <b>30%</b> · 加速 <b>0.5g</b></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- ================= 底部日志 ================= -->
  <footer class="logbar">
    <div class="log-hd">
      <span class="lt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l4 3-4 3M11 15h6"/><rect x="2.5" y="3.5" width="19" height="17" rx="2.5"/></svg>
        系统日志
      </span>
      <div class="log-filters">
        <button class="lchip" aria-pressed="true">全部</button>
        <button class="lchip" aria-pressed="false">MOVE</button>
        <button class="lchip" aria-pressed="false">WARN</button>
        <button class="lchip" aria-pressed="false">ERR</button>
      </div>
      <span class="rate"><span class="dot live"></span>watchdog 心跳 118 ms · 已缓存 <span id="logCount">6</span> 条</span>
    </div>
    <div class="log-body" id="logBody"><!-- JS 注入 --></div>
  </footer>
</div>

<script>
"use strict";
/* ============================================================
   主题控制：系统 / 浅色 / 深色，localStorage 持久化
   ============================================================ */
const THEME_KEY = "panthera.console.theme";
const themeBtns = document.querySelectorAll("[data-theme-set]");
function applyTheme(mode){
  if(mode === "system"){ document.documentElement.removeAttribute("data-theme"); }
  else { document.documentElement.setAttribute("data-theme", mode); }
  themeBtns.forEach(b => b.setAttribute("aria-pressed", String(b.dataset.themeSet === mode)));
  try{ localStorage.setItem(THEME_KEY, mode); }catch(e){}
}
themeBtns.forEach(b => b.addEventListener("click", () => applyTheme(b.dataset.themeSet)));
let savedTheme = "system";
try{ savedTheme = localStorage.getItem(THEME_KEY) || "system"; }catch(e){}
applyTheme(savedTheme);

/* ============================================================
   关节数据模型
   ============================================================ */
const joints = [
  {n:"J1", zh:"基座回转", angle:0.0000,  lim:2.967, vel:0.0, vmax:2.0, tq:2.4,  tmax:42, warn:false},
  {n:"J2", zh:"大臂俯仰", angle:-0.7854, lim:2.094, vel:0.0, vmax:2.0, tq:18.6, tmax:24, warn:true },
  {n:"J3", zh:"小臂俯仰", angle:1.5708,  lim:2.618, vel:0.0, vmax:2.5, tq:9.2,  tmax:32, warn:false},
  {n:"J4", zh:"腕部回转", angle:0.0000,  lim:3.054, vel:0.0, vmax:3.0, tq:0.8,  tmax:16, warn:false},
  {n:"J5", zh:"腕部俯仰", angle:0.7854,  lim:2.094, vel:0.0, vmax:3.0, tq:1.6,  tmax:16, warn:false},
  {n:"J6", zh:"末端回转", angle:-1.5708, lim:3.054, vel:0.0, vmax:3.0, tq:0.3,  tmax:10, warn:false},
];
const jointBody = document.getElementById("jointBody");
const jrefs = [];
joints.forEach((j,i) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><span class="jname">${j.n}<small>${j.zh}</small></span></td>
    <td class="val" data-a>${j.angle.toFixed(4)}</td>
    <td class="barcell"><div class="bibar"><div class="fill" data-abar style="background:var(--bar-angle)"></div></div></td>
    <td class="val" data-v>${j.vel.toFixed(3)}</td>
    <td class="barcell"><div class="bibar"><div class="fill" data-vbar style="background:var(--bar-vel)"></div></div></td>
    <td class="val" data-t>${j.tq.toFixed(1)}</td>
    <td class="barcell"><div class="unibar"><div class="fill" data-tbar></div></div></td>
    <td class="val"><span class="jstat ${j.warn?'warn':'hold'}" data-st>${j.warn?'临限':'保持'}</span></td>`;
  jointBody.appendChild(tr);
  jrefs.push({
    a:tr.querySelector("[data-a]"), abar:tr.querySelector("[data-abar]"),
    v:tr.querySelector("[data-v]"), vbar:tr.querySelector("[data-vbar]"),
    t:tr.querySelector("[data-t]"), tbar:tr.querySelector("[data-tbar]"),
    st:tr.querySelector("[data-st]")
  });
});

function setBipolar(el, frac){ // frac in [-1,1], 中心=50%
  frac = Math.max(-1, Math.min(1, frac));
  if(frac >= 0){ el.style.left = "50%"; el.style.width = (frac*50).toFixed(2)+"%"; }
  else { el.style.left = (50 + frac*50).toFixed(2)+"%"; el.style.width = (-frac*50).toFixed(2)+"%"; }
}
function torqueColor(r){ return r > 0.8 ? "var(--danger)" : (r > 0.6 ? "var(--warn-fill)" : "var(--bar-angle)"); }

/* ============================================================
   假遥测：微小抖动让界面“活”
   ============================================================ */
let servoOn = true;
function tickTelemetry(){
  joints.forEach((j,i) => {
    const r = jrefs[i];
    // 保持位微颤 + 偶发缓慢漂移
    const tremor = servoOn ? (Math.random()-0.5)*0.0016 : 0;
    const va = servoOn ? (Math.random()-0.5)*0.010 : 0;      // 速度噪声 rad/s
    j.vel = va;
    j.angle += va*0.1 + tremor;
    // 力矩围绕基值波动 ±6%
    const tqBase = [2.4,18.6,9.2,0.8,1.6,0.3][i];
    j.tq = servoOn ? Math.max(0, tqBase*(1 + (Math.random()-0.5)*0.12)) : tqBase*0.15;

    r.a.textContent = j.angle.toFixed(4);
    r.v.textContent = (j.vel>=0?" ":"") + j.vel.toFixed(3);
    r.t.textContent = j.tq.toFixed(1);
    setBipolar(r.abar, j.angle / j.lim);
    setBipolar(r.vbar, j.vel / j.vmax);
    const tr = j.tq / j.tmax;
    r.tbar.style.width = Math.min(100, tr*100).toFixed(1)+"%";
    r.tbar.style.background = torqueColor(tr);
  });
}
setInterval(tickTelemetry, 140);
tickTelemetry();

/* ============================================================
   笛卡尔当前位姿（带轻微抖动）
   ============================================================ */
const pose = [
  {k:"X", u:"m",   v:0.4123, j:0.0004}, {k:"Y", u:"m",   v:-0.0381, j:0.0004}, {k:"Z", u:"m",   v:0.2870, j:0.0003},
  {k:"Roll", u:"rad", v:3.1416, j:0.0006}, {k:"Pitch", u:"rad", v:0.0021, j:0.0006}, {k:"Yaw", u:"rad", v:-1.5708, j:0.0006},
];
const poseGrid = document.getElementById("poseGrid");
const prefs = [];
pose.forEach(p => {
  const d = document.createElement("div");
  d.className = "cart-cell";
  d.innerHTML = `<span class="lb">${p.k}<span class="u">${p.u}</span></span><span class="cv"></span>`;
  poseGrid.appendChild(d);
  prefs.push(d.querySelector(".cv"));
});
function tickPose(){
  pose.forEach((p,i) => {
    const val = p.v + (servoOn ? (Math.random()-0.5)*p.j : 0);
    prefs[i].textContent = (val>=0?" ":"") + val.toFixed(4);
  });
}
setInterval(tickPose, 200); tickPose();

/* ============================================================
   Jog 面板
   ============================================================ */
let step = 0.02;
const stepChips = document.getElementById("stepChips");
stepChips.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
  stepChips.querySelectorAll("button").forEach(x => x.setAttribute("aria-pressed","false"));
  b.setAttribute("aria-pressed","true");
  step = parseFloat(b.dataset.step);
  pushLog("INFO", `Jog 步进设为 <span class="hl">${step.toFixed(3)} rad</span>`);
}));

const jogGrid = document.getElementById("jogGrid");
joints.forEach((j,i) => {
  const row = document.createElement("div");
  row.className = "jog-row";
  row.innerHTML = `
    <span class="jl">${j.n}<small>${j.zh}</small></span>
    <button class="jogbtn" data-dir="-1" data-j="${i}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>负
    </button>
    <button class="jogbtn" data-dir="1" data-j="${i}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>正
    </button>
    <span class="cur" data-cur="${i}">${j.angle.toFixed(3)}</span>`;
  jogGrid.appendChild(row);
});
const curRefs = [...jogGrid.querySelectorAll("[data-cur]")];
setInterval(() => joints.forEach((j,i)=> curRefs[i].textContent = j.angle.toFixed(3)), 200);

let holdTimer = null;
function beginHold(btn){
  if(!servoOn){ pushLog("WARN", "伺服未使能，Jog 被安全层拦截"); return; }
  const idx = +btn.dataset.j, dir = +btn.dataset.dir;
  btn.classList.add("holding");
  const doStep = () => {
    const j = joints[idx];
    const nx = j.angle + dir*step;
    if(Math.abs(nx) > j.lim){ pushLog("WARN", `${j.n} 触及软限位 <span class="hl">±${j.lim.toFixed(3)} rad</span>，Jog 已钳制`); return; }
    j.angle = nx;
  };
  doStep();
  pushLog("MOVE", `Jog ${joints[idx].n} ${dir>0?'+':'−'}${step.toFixed(3)} rad（按住）`);
  holdTimer = setInterval(doStep, 120);
}
function endHold(){ document.querySelectorAll(".jogbtn.holding").forEach(b=>b.classList.remove("holding")); if(holdTimer){clearInterval(holdTimer); holdTimer=null;} }
jogGrid.querySelectorAll(".jogbtn").forEach(btn => {
  btn.addEventListener("mousedown", () => beginHold(btn));
  btn.addEventListener("touchstart", (e)=>{e.preventDefault(); beginHold(btn);}, {passive:false});
});
window.addEventListener("mouseup", endHold);
window.addEventListener("touchend", endHold);

/* ============================================================
   夹爪
   ============================================================ */
let gripPctVal = 62;
const gripFill = document.getElementById("gripFill"), gripPctEl = document.getElementById("gripPct"), gripMmEl = document.getElementById("gripMm");
function setGrip(p){
  gripPctVal = Math.max(0, Math.min(100, p));
  gripFill.style.width = gripPctVal + "%";
  gripPctEl.textContent = Math.round(gripPctVal);
  gripMmEl.textContent = (gripPctVal/100*85).toFixed(1) + " mm 开度 · 抓取力 " + (gripPctVal<8?0:24) + " N";
}
document.getElementById("gripOpen").addEventListener("click", ()=>{ setGrip(100); pushLog("MOVE","夹爪张开至 <span class=\"hl\">85.0 mm</span>"); });
document.getElementById("gripClose").addEventListener("click", ()=>{ setGrip(4); pushLog("MOVE","夹爪闭合 · 触发力控 24 N"); });

/* ============================================================
   使能 / 急停
   ============================================================ */
const enableToggle = document.getElementById("enableToggle");
enableToggle.addEventListener("change", () => {
  servoOn = enableToggle.checked;
  pushLog(servoOn?"INFO":"WARN", servoOn ? "伺服<span class=\"hl\">使能</span> · 6 轴励磁完成" : "伺服<span class=\"hl\">下电</span> · 抱闸锁定");
});
document.getElementById("estopBtn").addEventListener("click", triggerEstop);
document.addEventListener("keydown", (e)=>{ if(e.key === "Escape") triggerEstop(); });
function triggerEstop(){
  servoOn = false; enableToggle.checked = false;
  pushLog("ERR", "急停触发 · <span class=\"hl\">EStop 直通硬件</span> · 全轴抱闸");
}

/* ============================================================
   moveJ / moveL
   ============================================================ */
document.getElementById("moveJ").addEventListener("click", ()=>{
  if(!servoOn){ pushLog("WARN","伺服未使能，moveJ 被拒绝"); return; }
  pushLog("MOVE","moveJ → 目标位姿 · 软限位预检通过 · 排队中");
});
document.getElementById("moveL").addEventListener("click", ()=>{
  if(!servoOn){ pushLog("WARN","伺服未使能，moveL 被拒绝"); return; }
  pushLog("MOVE","moveL → 直线插补 12.4 cm · 速度 30% · 排队中");
});

/* ============================================================
   日志
   ============================================================ */
const logBody = document.getElementById("logBody");
const logCount = document.getElementById("logCount");
let logN = 0;
function nowTs(){
  const d = new Date();
  const p = (x,n=2)=>String(x).padStart(n,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${p(d.getMilliseconds(),3)}`;
}
function pushLog(level, msg){
  const ln = document.createElement("div");
  ln.className = "logln";
  ln.innerHTML = `<span class="ts">[${nowTs()}]</span><span class="lv ${level}">${level}</span><span class="msg">${msg}</span>`;
  logBody.appendChild(ln);
  logBody.scrollTop = logBody.scrollHeight;
  logN++; logCount.textContent = logN;
  while(logBody.children.length > 200) logBody.removeChild(logBody.firstChild);
}
// 预置历史
[
  ["INFO","armd 已连接 · gRPC <span class=\"hl\">localhost:50051</span>"],
  ["INFO","控制权已获取 · client=<span class=\"hl\">wpf-console</span>"],
  ["INFO","HardwareLoop 启动 · 轮询 200 Hz · watchdog 心跳正常"],
  ["MOVE","moveJ 到达 J2=<span class=\"hl\">-0.785 rad</span> · 误差 0.0004 rad"],
  ["INFO","D405 未挂载（v2 特性）· 视频流通道保留"],
  ["WARN","J2 力矩 <span class=\"hl\">18.6 N·m</span> 接近软阈值 24 N·m"],
].forEach(([lv,m]) => pushLog(lv,m));
logN = 6; logCount.textContent = logN;

// 偶发心跳日志，让日志条也“活”
setInterval(()=>{ if(Math.random()<0.5) pushLog("INFO", `watchdog 心跳 · loop ${(4.8+Math.random()*0.4).toFixed(2)} ms · 队列 0`); }, 6200);
</script>
